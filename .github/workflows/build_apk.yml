name: Build Oath of Dominion APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Find project root
        run: |
          echo "=== Repo root contents ==="
          ls -la
          echo "=== Searching for settings.gradle ==="
          find . -name "settings.gradle" -not -path "*/build/*" 2>/dev/null

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android packages
        run: |
          sdkmanager "platforms;android-34" "build-tools;34.0.0" 2>/dev/null || true

      - name: Generate wrapper and build APK
        run: |
          # Find real project root (where settings.gradle lives)
          PROJECT_DIR=$(find . -name "settings.gradle" -not -path "*/build/*" | head -1 | xargs dirname)
          echo "Project root: $PROJECT_DIR"
          cd "$PROJECT_DIR"
          
          # Generate gradle wrapper using pre-installed system gradle
          gradle wrapper --gradle-version=8.6 --distribution-type=bin
          echo "Wrapper files:"
          ls -la gradle/wrapper/
          
          # Build APK
          chmod +x gradlew
          ./gradlew assembleDebug --no-daemon --stacktrace
        env:
          ANDROID_HOME: ${{ env.ANDROID_SDK_ROOT }}
          ANDROID_SDK_ROOT: ${{ env.ANDROID_SDK_ROOT }}

      - name: Show APKs
        run: find . -name "*.apk" 2>/dev/null

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: OathOfDominion-APK
          path: "**/app-debug.apk"
          retention-days: 30
