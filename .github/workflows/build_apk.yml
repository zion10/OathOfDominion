name: Build Oath of Dominion APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Install Android SDK build tools
        run: |
          echo "y" | $ANDROID_SDK_ROOT/cmdline-tools/latest/bin/sdkmanager \
            "platforms;android-34" \
            "build-tools;34.0.0" \
            "platform-tools" 2>/dev/null || true

      - name: Create Gradle wrapper using Java directly
        run: |
          # Use the pre-installed Gradle from the ubuntu runner
          which gradle || apt-get install -y gradle
          gradle wrapper --gradle-version 8.6
          chmod +x gradlew
          ls -la gradlew gradle/wrapper/

      - name: Build APK
        run: |
          ./gradlew assembleDebug --no-daemon --stacktrace
        env:
          ANDROID_HOME: ${{ env.ANDROID_SDK_ROOT }}

      - name: List outputs
        run: find . -name "*.apk" 2>/dev/null || echo "No APK found"

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: OathOfDominion-APK
          path: app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30
